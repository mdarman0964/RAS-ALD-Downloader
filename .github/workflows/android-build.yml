name: RAS ALD - Android CI/CD

on:
  push:
    branches: [ main, develop ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

env:
  JAVA_VERSION: '17'

jobs:
  setup:
    name: ⚙️ Setup & Verify Gradle
    runs-on: ubuntu-latest
    outputs:
      gradle-ok: ${{ steps.verify.outcome }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Fix gradlew line endings
        run: |
          sed -i 's/\r$//' gradlew
          chmod +x gradlew

      - name: Verify Gradle Wrapper
        id: verify
        run: ./gradlew --version

  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - run: sed -i 's/\r$//' gradlew && chmod +x gradlew
      - run: ./gradlew ktlintCheck || true
      - run: ./gradlew lintDebug

  unit-test:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - run: sed -i 's/\r$//' gradlew && chmod +x gradlew
      - run: ./gradlew testDebugUnitTest --no-daemon

  build-debug:
    name: 🔨 Debug APK
    runs-on: ubuntu-latest
    needs: unit-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - run: sed -i 's/\r$//' gradlew && chmod +x gradlew
      - run: ./gradlew assembleDebug --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk

  build-release:
    name: 📦 Release APK
    runs-on: ubuntu-latest
    needs: unit-test
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/release.keystore
          echo "KEYSTORE_PATH=app/release.keystore" >> $GITHUB_ENV

      - run: sed -i 's/\r$//' gradlew && chmod +x gradlew
      - run: ./gradlew assembleRelease --no-daemon

      - name: Rename APK
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mv app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/RAS-ALD-v${VERSION}.apk

      - uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/*.apk

  github-release:
    name: 🚀 GitHub Release
    runs-on: ubuntu-latest
    needs: build-release
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-apk
          path: release/

      - uses: softprops/action-gh-release@v1
        with:
          files: release/*.apk
          generate_release_notes: true
